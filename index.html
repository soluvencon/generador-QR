<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador QR Pro - Versión Completa</title>
  <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a;
      --accent: #a3e635; --accent-dim: #6b9a22; --text: #f0f0f0; --muted: #888;
    }
    body {
      background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem;
    }
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 2.2rem; color: var(--accent); }
    header p { color: var(--muted); font-size: 0.9rem; margin-top: 0.5rem; }
    .container { display: flex; flex-wrap: wrap; gap: 2rem; max-width: 1000px; width: 100%; justify-content: center; }
    
    .controls-panel {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem;
      flex: 1; min-width: 340px; display: flex; flex-direction: column; gap: 1rem; max-height: 95vh; overflow-y: auto;
    }
    .controls-panel::-webkit-scrollbar { width: 6px; }
    .controls-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    
    .section-title {
      font-size: 0.85rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em;
      border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-top: 0.5rem; font-weight: 800;
    }
    label { font-size: 0.8rem; color: var(--muted); display: block; margin-bottom: 0.3rem; }
    input[type="text"], select {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-size: 0.9rem; padding: 0.6rem; outline: none; transition: 0.2s;
    }
    input[type="text"]:focus, select:focus { border-color: var(--accent); }
    .row { display: flex; gap: 1rem; } .col { flex: 1; }
    input[type="color"] {
      width: 100%; height: 36px; border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg); cursor: pointer; padding: 2px;
    }
    input[type="range"] { width: 100%; accent-color: var(--accent); }
    input[type="file"] { font-size: 0.8rem; color: var(--muted); }
    input[type="file"]::file-selector-button {
      background: var(--bg); color: var(--accent); border: 1px solid var(--accent-dim);
      border-radius: 4px; padding: 0.4rem; cursor: pointer; margin-right: 0.5rem;
    }
    
    .preview-panel {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem;
      flex: 1.2; min-width: 360px; display: flex; flex-direction: column; align-items: center; gap: 1.5rem;
      position: sticky; top: 2rem;
    }
    #main-canvas {
      background: repeating-conic-gradient(#e0e0e0 0% 25%, #ffffff 0% 50%) 50% / 20px 20px;
      border-radius: 8px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); max-width: 100%; height: auto;
    }
    .btn-dl {
      width: 100%; background: var(--accent); color: #0f0f0f; border: none; border-radius: 8px;
      font-weight: 800; font-size: 1.1rem; padding: 1rem; cursor: pointer; transition: 0.2s;
    }
    .btn-dl:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(163, 230, 53, 0.3); }
    /* El QR oculto debe existir pero no estorbar */
    #hidden-qr { position: fixed; left: -9999px; top: -9999px; opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

  <header>
    <h1>QR DESIGNER PRO</h1>
    <p>Versión Estable · Todas las opciones · Sin errores</p>
  </header>

  <div class="container">
    <div class="controls-panel">
      
      <div class="section-title">1. Contenido y Texto</div>
      <div>
        <label>URL o Texto del QR</label>
        <input type="text" id="data" value="https://tu-app.com" oninput="triggerUpdate()">
      </div>
      <div class="row">
        <div class="col">
          <label>Texto Descriptivo</label>
          <input type="text" id="qr-text" value="ESCANEA QR" oninput="triggerUpdate()">
        </div>
        <div class="col" style="flex: 0.5">
          <label>Posición</label>
          <select id="text-pos" onchange="triggerUpdate()">
            <option value="in">Dentro</option>
            <option value="out">Fuera</option>
          </select>
        </div>
      </div>

      <div class="section-title">2. Ícono Central (Señal)</div>
      <div class="row">
        <div class="col">
          <label>Ícono Predeterminado</label>
          <select id="icon-select" onchange="triggerUpdate()">
            <option value="none">Ninguno</option>
            <option value="cutlery">Cuchillo y Tenedor</option>
            <option value="plate">Plato de Comida</option>
            <option value="coffee">Taza de Café</option>
            <option value="delivery">Moto Domicilio</option>
            <option value="cart">Carrito Compras</option>
            <option value="pin">Pin de Ubicación</option>
          </select>
        </div>
        <div class="col">
          <label>Tu Propio Logo</label>
          <input type="file" id="logo-upload" accept="image/*" onchange="handleLogo(this)" style="margin-top: 3px;">
        </div>
      </div>

      <div class="section-title">3. Estilo del Código QR</div>
      <div class="row">
        <div class="col">
          <label>Forma Puntos</label>
          <select id="dot-style" onchange="triggerUpdate()">
            <option value="square">Cuadrados</option>
            <option value="dots">Bolitas</option>
            <option value="rounded">Redondeados</option>
          </select>
        </div>
        <div class="col">
          <label>Forma Esquinas</label>
          <select id="corner-style" onchange="triggerUpdate()">
            <option value="square">Cuadradas</option>
            <option value="dot">Bolitas</option>
            <option value="extra-rounded">Redondeadas</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="col"><label>Color QR</label><input type="color" id="color-dark" value="#000000" oninput="triggerUpdate()"></div>
        <div class="col"><label>Fondo QR</label><input type="color" id="color-light" value="#ffffff" oninput="triggerUpdate()"></div>
      </div>

      <div class="section-title">4. Contorno / Envoltura (12 Opciones)</div>
      <div class="row">
        <div class="col">
          <label>Tipo de Envoltura</label>
          <select id="frame-type" onchange="triggerUpdate()">
            <option value="none">Sin Envoltura</option>
            <optgroup label="Bolsas de Domicilio">
              <option value="domidelis">Bolsa Domicilio (2 Asas)</option>
              <option value="single_strip">Bolsa Tirita (1 Asa)</option>
              <option value="tote">Bolsa Tote (Ecológica)</option>
              <option value="kraft">Bolsa Kraft (Papel)</option>
            </optgroup>
            <optgroup label="Marcos de Apps y Descuentos">
              <option value="ticket">Ticket Domicilio</option>
              <option value="header">Cabecera App (Delivery)</option>
              <option value="coupon">Cupón de Descuento</option>
              <option value="gift_card">Tarjeta de Regalo</option>
            </optgroup>
            <optgroup label="Formas Geométricas y Mapas">
              <option value="badge">Escudo / Insignia</option>
              <option value="phone">Marco Celular</option>
              <option value="pin">Marcador de Mapa</option>
            </optgroup>
          </select>
        </div>
        <div class="col">
          <label>Color Envoltura</label>
          <input type="color" id="frame-color" value="#000000" oninput="triggerUpdate()">
        </div>
      </div>
    </div>

    <div class="preview-panel">
      <h3 style="color: var(--accent); letter-spacing: 2px;">VISTA PREVIA</h3>
      <canvas id="main-canvas" width="400" height="500"></canvas>
      <button class="btn-dl" onclick="downloadImage()">↓ DESCARGAR IMAGEN HD</button>
    </div>
  </div>

  <div id="hidden-qr"></div>

  <script>
    // ÍCONOS SEGUROS (Usando encodeURIComponent para evitar el fallo de lectura que borraba el QR)
    const ic = (svg) => `data:image/svg+xml,${encodeURIComponent(svg)}`;
    const iconDictionary = {
      none: "",
      cutlery: ic('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/></svg>'),
      plate: ic('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black"><path d="M2 12C2 6.48 6.48 2 12 2s10 4.48 10 10-4.48 10-10 10S2 17.52 2 12zm10 8c4.41 0 8-3.59 8-8s-3.59-8-8-8-8 3.59-8 8 3.59 8 8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>'),
      coffee: ic('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black"><path d="M2 21h18v-2H2v2zM20 8h-2V5h2v3zm0-5H6v2h14V3zM4 7v2h2V7H4zm0 4h2v2H4v-2zm0 4h2v2H4v-2zm16-2H6v8h12v-8zm-2 6H8v-4h8v4z"/></svg>'),
      delivery: ic('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black"><path d="M19 7c0-1.1-.9-2-2-2h-3v2h3v2.65L13.52 14H10V9H6c-2.21 0-4 1.79-4 4v3h2c0 1.66 1.34 3 3 3s3-1.34 3-3h4.48L19 10.35V7zM7 17c-.55 0-1-.45-1-1h2c0 .55-.45 1-1 1z"/></svg>'),
      cart: ic('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>'),
      pin: ic('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>')
    };

    const qrCode = new QRCodeStyling({
      width: 1000, height: 1000, type: "canvas",
      data: "https://tu-app.com",
      image: iconDictionary.cutlery,
      dotsOptions: { color: "#000000", type: "square" },
      backgroundOptions: { color: "#ffffff" },
      cornersSquareOptions: { type: "square" },
      cornersDotOptions: { type: "square" },
      imageOptions: { crossOrigin: "anonymous", margin: 10, imageSize: 0.3 },
      qrOptions: { errorCorrectionLevel: 'H' }
    });
    qrCode.append(document.getElementById("hidden-qr"));

    let customUserLogo = "";
    let updateTimeout;

    function handleLogo(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => { customUserLogo = e.target.result; triggerUpdate(); };
        reader.readAsDataURL(input.files[0]);
      } else { customUserLogo = ""; triggerUpdate(); }
    }

    function triggerUpdate() {
      clearTimeout(updateTimeout);
      updateTimeout = setTimeout(generateAndDraw, 250);
    }

    function generateAndDraw() {
      const iconSelected = document.getElementById('icon-select').value;
      let finalImage = customUserLogo || iconDictionary[iconSelected];

      qrCode.update({
        data: document.getElementById('data').value || " ",
        image: finalImage,
        dotsOptions: { color: document.getElementById('color-dark').value, type: document.getElementById('dot-style').value },
        backgroundOptions: { color: document.getElementById('color-light').value },
        cornersSquareOptions: { color: document.getElementById('color-dark').value, type: document.getElementById('corner-style').value },
        cornersDotOptions: { color: document.getElementById('color-dark').value, type: document.getElementById('corner-style').value === 'dot' ? 'dot' : 'square' },
        imageOptions: { imageSize: 0.3 }
      });
      
      // Tiempo de espera para que la librería pinte el QR oculto sin fallar
      setTimeout(drawFinalCanvas, 400);
    }

    function drawFinalCanvas() {
      const srcCanvas = document.querySelector('#hidden-qr canvas');
      if (!srcCanvas || srcCanvas.width === 0) {
        setTimeout(drawFinalCanvas, 200); // Si no está listo, espera y reintenta
        return;
      }

      const mainCanvas = document.getElementById('main-canvas');
      const ctx = mainCanvas.getContext('2d');
      
      const frameType = document.getElementById('frame-type').value;
      const frameColor = document.getElementById('frame-color').value;
      const text = document.getElementById('qr-text').value;
      const textPos = document.getElementById('text-pos').value;

      const qrSize = 240;
      let canvasW = 320;
      let canvasH = 450;
      let qrX = 40;
      let qrY = 100;

      // Sistema robusto de cálculo de espacio
      let textSpace = text ? 50 : 0;
      if (textPos === 'out') textSpace = 60;

      switch(frameType) {
        case 'domidelis': canvasW=320; qrX=40; qrY=100; canvasH = qrY + qrSize + 70 + textSpace; break;
        case 'single_strip': canvasW=300; qrX=30; qrY=100; canvasH = qrY + qrSize + 70 + textSpace; break;
        case 'tote': canvasW=320; qrX=40; qrY=90; canvasH = qrY + qrSize + 60 + textSpace; break;
        case 'kraft': canvasW=320; qrX=40; qrY=110; canvasH = qrY + qrSize + 60 + textSpace; break;
        case 'ticket': canvasW=340; qrX=50; qrY=40; canvasH = qrSize + 80 + textSpace; break;
        case 'header': canvasW=340; qrX=50; qrY=100; canvasH = qrSize + 120 + textSpace; break;
        case 'coupon': canvasW=340; qrX=50; qrY=40; canvasH = qrSize + 80 + textSpace; break;
        case 'gift_card': canvasW=340; qrX=50; qrY=40; canvasH = qrSize + 80 + textSpace; break;
        case 'badge': canvasW=320; qrX=40; qrY=30; canvasH = qrSize + 120 + textSpace; break;
        case 'phone': canvasW=300; qrX=30; qrY=80; canvasH = qrSize + 120 + textSpace; break;
        case 'pin': canvasW=320; qrX=40; qrY=60; canvasH = qrSize + 150 + textSpace; break;
        default: canvasW=320; qrX=40; qrY=40; canvasH = qrSize + 80 + textSpace; break; // none
      }

      mainCanvas.width = canvasW;
      mainCanvas.height = canvasH;
      ctx.clearRect(0, 0, canvasW, canvasH);

      // 1. Dibujar Marco
      switch(frameType) {
        case 'domidelis': drawDomidelis(ctx, canvasW, canvasH, frameColor, text, textPos); break;
        case 'single_strip': drawSingleStrip(ctx, canvasW, canvasH, frameColor, text, textPos); break;
        case 'tote': drawTote(ctx, canvasW, canvasH, frameColor, text, textPos); break;
        case 'kraft': drawKraft(ctx, canvasW, canvasH, frameColor, text, textPos); break;
        case 'ticket': drawTicket(ctx, canvasW, canvasH, frameColor, text, textPos); break;
        case 'header': drawHeader(ctx, canvasW, canvasH, frameColor, text, textPos); break;
        case 'coupon': drawCoupon(ctx, canvasW, canvasH, frameColor, text, textPos); break;
        case 'gift_card': drawGiftCard(ctx, canvasW, canvasH, frameColor, text, textPos); break;
        case 'badge': drawBadge(ctx, canvasW, canvasH, frameColor, text, textPos); break;
        case 'phone': drawPhone(ctx, canvasW, canvasH, frameColor, text, textPos); break;
        case 'pin': drawPin(ctx, canvasW, canvasH, frameColor, text, textPos); break;
      }

      // 2. Dibujar QR (El mismo siempre, ajustado al espacio)
      ctx.drawImage(srcCanvas, qrX, qrY, qrSize, qrSize);

      // 3. Dibujar Texto para marcos que NO son bolsas (las bolsas lo dibujan por dentro)
      if (text && !['domidelis', 'single_strip', 'tote', 'kraft'].includes(frameType)) {
        ctx.fillStyle = textPos === 'in' ? '#ffffff' : '#000000';
        if (frameType === 'pin' && textPos === 'out') ctx.fillStyle = frameColor;
        ctx.font = 'bold 24px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        let textY = textPos === 'in' ? (qrY + qrSize + 30) : (canvasH - 25);
        ctx.fillText(text, canvasW / 2, textY);
      }
    }

    // --- FUNCIONES DE DIBUJO DE MARCOS ---

    function drawDomidelis(ctx, w, h, color, text, textPos) {
      ctx.fillStyle = color; roundRect(ctx, 20, 70, w - 40, h - 90, 15); ctx.fill();
      ctx.lineWidth = 10; ctx.strokeStyle = color; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(w/2 - 35, 70, 25, Math.PI, 0, false); ctx.stroke();
      ctx.beginPath(); ctx.arc(w/2 + 35, 70, 25, Math.PI, 0, false); ctx.stroke();
      if (text) { ctx.fillStyle = '#fff'; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom'; ctx.fillText(text, w/2, h - 30); }
    }

    function drawSingleStrip(ctx, w, h, color, text, textPos) {
      ctx.fillStyle = color; roundRect(ctx, 20, 80, w - 40, h - 100, 15); ctx.fill();
      ctx.fillRect(w/2 - 8, 40, 16, 45);
      ctx.lineWidth = 14; ctx.strokeStyle = color; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(w/2, 40, 25, Math.PI, 0, false); ctx.stroke();
      if (text) { ctx.fillStyle = '#fff'; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom'; ctx.fillText(text, w/2, h - 30); }
    }

    function drawTote(ctx, w, h, color, text, textPos) {
      ctx.fillStyle = color; ctx.fillRect(30, 70, w - 60, h - 100);
      ctx.lineWidth = 10; ctx.strokeStyle = color; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(80, 70); ctx.quadraticCurveTo(80, 20, 120, 20); ctx.lineTo(120, 70); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(w - 80, 70); ctx.quadraticCurveTo(w - 80, 20, w - 120, 20); ctx.lineTo(w - 120, 70); ctx.stroke();
      if (text) { ctx.fillStyle = '#fff'; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom'; ctx.fillText(text, w/2, h - 30); }
    }

    function drawKraft(ctx, w, h, color, text, textPos) {
      ctx.fillStyle = color; roundRect(ctx, 20, 80, w - 40, h - 100, 5); ctx.fill();
      ctx.beginPath(); ctx.moveTo(20, 110); ctx.lineTo(70, 80); ctx.lineTo(w - 70, 80); ctx.lineTo(w - 20, 110); ctx.closePath();
      ctx.fillStyle = lightenColor(color, 15); ctx.fill();
      ctx.strokeStyle = lightenColor(color, 30); ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(20, 110); ctx.lineTo(w - 20, 110); ctx.stroke();
      if (text) { ctx.fillStyle = '#fff'; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom'; ctx.fillText(text, w/2, h - 30); }
    }

    function drawTicket(ctx, w, h, color, text, textPos) {
      ctx.fillStyle = color; ctx.fillRect(0, 0, w, h);
      ctx.setLineDash([5, 5]); ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.strokeRect(10, 10, w - 20, h - 20); ctx.setLineDash([]);
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath(); ctx.arc(0, h / 2, 15, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(w, h / 2, 15, 0, Math.PI * 2); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
    }

    function drawHeader(ctx, w, h, color, text, textPos) {
      ctx.fillStyle = color; roundRectTop(ctx, 0, 0, w, 55, 15); ctx.fill(); ctx.fillRect(0, 40, w, h - 40);
    }

    function drawCoupon(ctx, w, h, color, text, textPos) {
      ctx.fillStyle = color; ctx.fillRect(0, 0, w, h);
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath(); ctx.arc(w / 2, 0, 20, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(w / 2, h, 20, 0, Math.PI * 2); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
      ctx.setLineDash([8, 8]); ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(w/2, 20); ctx.lineTo(w/2, h - 20); ctx.stroke(); ctx.setLineDash([]);
    }

    function drawGiftCard(ctx, w, h, color, text, textPos) {
      ctx.fillStyle = color; ctx.beginPath();
      ctx.moveTo(15, 0); ctx.lineTo(w - 40, 0); ctx.lineTo(w, 40); ctx.lineTo(w, h - 15);
      ctx.quadraticCurveTo(w, h, w - 15, h); ctx.lineTo(15, h);
      ctx.quadraticCurveTo(0, h, 0, h - 15); ctx.lineTo(0, 15);
      ctx.quadraticCurveTo(0, 0, 15, 0); ctx.closePath(); ctx.fill();
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath(); ctx.moveTo(w - 40, 0); ctx.lineTo(w, 40); ctx.lineTo(w - 40, 40); ctx.closePath(); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.moveTo(w - 40, 0); ctx.lineTo(w, 40); ctx.lineTo(w - 40, 40); ctx.closePath(); ctx.fill();
    }

    function drawBadge(ctx, w, h, color, text, textPos) {
      ctx.fillStyle = color; ctx.beginPath();
      ctx.moveTo(20, 0); ctx.lineTo(w - 20, 0); ctx.quadraticCurveTo(w, 0, w, 20);
      ctx.lineTo(w, h - 60); ctx.lineTo(w / 2, h); ctx.lineTo(0, h - 60); ctx.lineTo(0, 20);
      ctx.quadraticCurveTo(0, 0, 20, 0); ctx.closePath(); ctx.fill();
    }

    function drawPhone(ctx, w, h, color, text, textPos) {
      ctx.fillStyle = color; roundRect(ctx, 10, 0, w - 20, h, 30); ctx.fill();
      ctx.fillStyle = "#ffffff"; ctx.fillRect(20, 50, w - 40, h - 70);
      ctx.fillStyle = color; roundRect(ctx, w/2 - 40, 5, 80, 25, 10); ctx.fill();
    }

    function drawPin(ctx, w, h, color, text, textPos) {
      ctx.fillStyle = color; ctx.beginPath();
      ctx.arc(w / 2, h / 3, w / 2 - 10, Math.PI, 0, false);
      ctx.lineTo(w / 2, h - 50); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(w / 2, h / 3, 50, 0, Math.PI * 2); ctx.fill();
    }

    // --- UTILIDADES ---
    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath(); ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y); ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius); ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height); ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius); ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath();
    }
    function roundRectTop(ctx, x, y, width, height, radius) {
      ctx.beginPath(); ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y); ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height); ctx.lineTo(x, y + height);
      ctx.lineTo(x, y + radius); ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath();
    }
    function lightenColor(hex, percent) {
      const num = parseInt(hex.replace("#",""), 16); const amt = Math.round(2.55 * percent);
      const R = (num >> 16) + amt; const G = (num >> 8 & 0x00FF) + amt; const B = (num & 0x0000FF) + amt;
      return "#" + (0x1000000 + (R<0?0:R>255?255:R) * 0x10000 + (G<0?0:G>255?255:G) * 0x100 + (B<0?0:B>255?255:B)).toString(16).slice(1);
    }

    function downloadImage() {
      const mainCanvas = document.getElementById('main-canvas');
      const link = document.createElement('a'); link.download = 'QR_Diseno_Pro.png';
      const tempCanvas = document.createElement('canvas'); tempCanvas.width = mainCanvas.width; tempCanvas.height = mainCanvas.height;
      const tempCtx = tempCanvas.getContext('2d'); tempCtx.fillStyle = '#ffffff'; tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
      tempCtx.drawImage(mainCanvas, 0, 0);
      link.href = tempCanvas.toDataURL('image/png'); link.click();
    }

    generateAndDraw();
  </script>
